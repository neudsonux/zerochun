<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zero Churn IA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --text-1: #101828;
      --text-3: #475467;
      --border: #eaecf0;
      --bg: #f9fafb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 1px 3px rgba(16,24,40,.1), 0 1px 2px rgba(16,24,40,.06);
    }

    .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--brand), #1e40af);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 24px;
      box-shadow: 0 4px 12px rgba(37,99,235,.3);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -.02em;
      margin-bottom: 8px;
    }

    p {
      font-size: 15px;
      color: var(--text-3);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn-group { display: flex; flex-direction: column; gap: 12px; }

    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 20px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, transform .1s;
      box-shadow: 0 1px 3px rgba(37,99,235,.3);
    }

    .btn-primary:hover { background: var(--brand-dark); transform: translateY(-1px); }

    .btn-secondary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 20px;
      background: #fff;
      color: var(--text-1);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
      box-shadow: 0 1px 2px rgba(16,24,40,.05);
    }

    .btn-secondary:hover { background: var(--bg); border-color: #d0d5dd; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 8px 0;
      color: #98a2b3;
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #98a2b3;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">⚡</div>
  <h1>Zero Churn IA</h1>
  <p>Retenção proativa de clientes com inteligência artificial para ISPs.</p>

  <div class="btn-group">
    <a href="zero_churn_dashboard_v5.html" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Abrir Dashboard
    </a>

    <div class="divider">ou</div>

    <a href="zero_churn_upload.html" class="btn-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload de Planilhas CSV
    </a>
  </div>
</div>

<div class="footer">Zero Churn IA · MVP v1.0 · 2026</div>

</body>
</html>
